<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fbff;
      --muted: #bed0df;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(10, 18, 30, 0.64);
      --gold: #ffd166;
      --aqua: #51e5d4;
      --rose: #ff6b9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(81, 229, 212, 0.28), transparent 32%),
        radial-gradient(circle at 82% 25%, rgba(255, 107, 154, 0.24), transparent 34%),
        linear-gradient(135deg, #07111f 0%, #14233a 48%, #180f24 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .site-nav {
      position: fixed;
      top: 24px;
      left: 50%;
      z-index: 2;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(10, 18, 30, 0.72);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      transform: translateX(-50%);
    }

    .site-nav a {
      min-width: 82px;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    .site-nav a[aria-current="page"] {
      color: #06111e;
      background: var(--gold);
    }

    .stage {
      width: min(92vw, 820px);
      padding: clamp(28px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 28px;
      position: relative;
      isolation: isolate;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)), var(--panel);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--aqua), transparent 34%, var(--rose) 70%, var(--gold));
      opacity: 0.5;
      filter: blur(18px);
    }

    .eyebrow {
      width: fit-content;
      margin: 0 auto 22px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.75rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .shine {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #ffffff, var(--aqua), var(--gold), #ffffff);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 5s ease-in-out infinite;
    }

    p {
      max-width: 620px;
      margin: 26px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.1);
    }

    .button.primary {
      color: #06111e;
      background: var(--aqua);
    }

    @keyframes shimmer {
      0%, 100% {
        background-position: 0% center;
      }

      50% {
        background-position: 100% center;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 92px 0 28px;
        overflow: auto;
      }

      .site-nav {
        top: 16px;
        width: min(92vw, 360px);
      }

      .site-nav a {
        min-width: 0;
        flex: 1;
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="about.html" aria-current="page">About</a>
    <a href="contact.html">Contact</a>
  </nav>
  <main class="stage" aria-label="About this site">
    <div class="eyebrow">About</div>
    <h1>Small Site <span class="shine">Big Glow</span></h1>
    <p>This little web project started as a polished hello world and now has room to grow. It keeps things simple: a clear page, a shared mood, and links that make the experience feel complete.</p>
    <div class="actions">
      <a class="button primary" href="contact.html">Contact</a>
      <a class="button" href="index.html">Back Home</a>
    </div>
  </main>
</body>
</html>
