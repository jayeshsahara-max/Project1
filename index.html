<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fbff;
      --muted: #bed0df;
      --line: rgba(255, 255, 255, 0.18);
      --panel: rgba(10, 18, 30, 0.64);
      --gold: #ffd166;
      --aqua: #51e5d4;
      --rose: #ff6b9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(81, 229, 212, 0.28), transparent 32%),
        radial-gradient(circle at 82% 25%, rgba(255, 107, 154, 0.24), transparent 34%),
        linear-gradient(135deg, #07111f 0%, #14233a 48%, #180f24 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .stage {
      width: min(92vw, 820px);
      padding: clamp(28px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 28px;
      position: relative;
      isolation: isolate;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)), var(--panel);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px);
      text-align: center;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--aqua), transparent 34%, var(--rose) 70%, var(--gold));
      opacity: 0.5;
      filter: blur(18px);
    }

    .eyebrow {
      width: fit-content;
      margin: 0 auto 22px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 13vw, 8.75rem);
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .shine {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #ffffff, var(--aqua), var(--gold), #ffffff);
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 5s ease-in-out infinite;
    }

    p {
      max-width: 560px;
      margin: 26px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      line-height: 1.7;
    }

    .sparkles {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 36px;
    }

    .sparkles span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--aqua);
      box-shadow: 0 0 28px currentColor;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .sparkles span:nth-child(2) {
      color: var(--gold);
      background: var(--gold);
      animation-delay: 0.2s;
    }

    .sparkles span:nth-child(3) {
      color: var(--rose);
      background: var(--rose);
      animation-delay: 0.4s;
    }

    @keyframes shimmer {
      0%, 100% {
        background-position: 0% center;
      }

      50% {
        background-position: 100% center;
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: translateY(0) scale(0.85);
        opacity: 0.5;
      }

      50% {
        transform: translateY(-8px) scale(1.15);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Hello world greeting">
    <div class="eyebrow">Freshly minted</div>
    <h1>Hello <span class="shine">World</span></h1>
    <p>A tiny page with a little glass, glow, and motion, ready to open straight from this folder.</p>
    <div class="sparkles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </main>
</body>
</html>
